events {}

http {

    include    mime.types;

    server {
        listen  8080;
        root    /usr/share/nginx/html;


        location /myfavoritethings {
            root /usr/share/nginx/html;
        }

        location /generallynicethings {
            alias /usr/share/nginx/html/myfavoritethings;
        }

        location ~* /count/[0-9] {
            try_files /count/count.html /index.html =404;
        }
    }
}
